@if (isOpen) {
  <div class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-background border border-border w-full max-w-lg rounded-xl shadow-2xl overflow-hidden animate-[fadeIn_0.15s_ease-out]">
      
      <!-- Modal Header -->
      <div class="px-6 py-4 border-b border-border/80 flex items-center justify-between bg-card/30">
        <h3 class="font-bold text-xs tracking-wide font-mono uppercase text-foreground/80">
          {{ task ? 'Editar Tarea' : 'Nueva Tarea' }}
        </h3>
        <button (click)="onCloseClick()" class="text-foreground/45 hover:text-foreground p-1 cursor-pointer rounded hover:bg-card/70 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Server Error Banner (inside modal) -->
      @if (saveError) {
        <div class="mx-6 mt-4 bg-rose-500/10 border border-rose-500/30 text-rose-500 px-3 py-2 rounded-lg text-xs">
          {{ saveError }}
        </div>
      }

      <!-- Modal Body -->
      <div class="p-6 flex flex-col gap-4">
        
        <!-- Title Input -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Título *</label>
          <input 
            type="text" 
            [ngModel]="modalTitle()" 
            (ngModelChange)="modalTitle.set($event)"
            placeholder="Nombre de la tarea..."
            class="w-full px-3 py-2 border rounded-lg bg-card text-foreground placeholder-foreground/30 focus:outline-none focus:ring-1 focus:ring-primary text-sm"
            [class.border-rose-500]="formErrors['Title']"
            [class.border-border]="!formErrors['Title']"
          />
          @if (formErrors['Title']) {
            <span class="text-[10px] text-rose-500 font-mono">{{ formErrors['Title']?.[0] }}</span>
          }
        </div>

        <!-- Description Textarea -->
        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Descripción</label>
          <textarea 
            [ngModel]="modalDescription()" 
            (ngModelChange)="modalDescription.set($event)"
            placeholder="Detalles adicionales..."
            rows="2"
            class="w-full px-3 py-2 border border-border rounded-lg bg-card text-foreground placeholder-foreground/30 focus:outline-none focus:ring-1 focus:ring-primary text-sm resize-none"
          ></textarea>
        </div>

        <!-- Fecha y hora SEPARADAS -->
        <div class="grid grid-cols-2 gap-3">
          <!-- Fecha -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Fecha límite</label>
            <input 
              type="date" 
              [ngModel]="modalDate()" 
              (ngModelChange)="modalDate.set($event)"
              class="w-full px-3 py-2 border border-border rounded-lg bg-card text-foreground focus:outline-none focus:ring-1 focus:ring-primary text-sm"
              [class.border-rose-500]="formErrors['DueDate']"
            />
            @if (formErrors['DueDate']) {
              <span class="text-[10px] text-rose-500 font-mono">{{ formErrors['DueDate']?.[0] }}</span>
            }
          </div>

          <!-- Hora -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Hora</label>
            <input 
              type="time" 
              [ngModel]="modalTime()" 
              (ngModelChange)="modalTime.set($event)"
              class="w-full px-3 py-2 border border-border rounded-lg bg-card text-foreground focus:outline-none focus:ring-1 focus:ring-primary text-sm"
              [disabled]="!modalDate()"
            />
          </div>
        </div>

        <!-- Columna + Categoría -->
        <div class="grid grid-cols-2 gap-3">
          <!-- Columna destino -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Columna</label>
            <select 
              [ngModel]="modalColumn()" 
              (ngModelChange)="modalColumn.set($event)"
              class="w-full px-3 py-2 border border-border rounded-lg bg-card text-foreground focus:outline-none focus:ring-1 focus:ring-primary text-sm font-sans appearance-none"
            >
              @for (col of columns; track col) {
                <option [value]="col">{{ col }}</option>
              }
            </select>
          </div>

          <!-- Categoría/Tablero libre -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Tablero</label>
            <input 
              type="text" 
              [ngModel]="modalCategory()" 
              (ngModelChange)="modalCategory.set($event)"
              placeholder="ej: Trabajo, Personal..."
              class="w-full px-3 py-2 border border-border rounded-lg bg-card text-foreground placeholder-foreground/30 focus:outline-none focus:ring-1 focus:ring-primary text-sm"
            />
          </div>
        </div>

        <!-- Priority Selector -->
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Prioridad</label>
          <div class="grid grid-cols-3 gap-2">
            <button 
              type="button"
              (click)="modalPriority.set('Low')"
              class="px-3 py-2 text-xs font-mono border rounded-lg transition-colors cursor-pointer focus:outline-none"
              [class.bg-card]="modalPriority() === 'Low'"
              [class.border-primary]="modalPriority() === 'Low'"
              [class.text-primary]="modalPriority() === 'Low'"
              [class.border-border]="modalPriority() !== 'Low'"
              [class.text-foreground/60]="modalPriority() !== 'Low'">
              Baja
            </button>
            <button 
              type="button"
              (click)="modalPriority.set('Medium')"
              class="px-3 py-2 text-xs font-mono border rounded-lg transition-colors cursor-pointer focus:outline-none"
              [class.bg-card]="modalPriority() === 'Medium'"
              [class.border-primary]="modalPriority() === 'Medium'"
              [class.text-primary]="modalPriority() === 'Medium'"
              [class.border-border]="modalPriority() !== 'Medium'"
              [class.text-foreground/60]="modalPriority() !== 'Medium'">
              Media
            </button>
            <button 
              type="button"
              (click)="modalPriority.set('High')"
              class="px-3 py-2 text-xs font-mono border rounded-lg transition-colors cursor-pointer focus:outline-none"
              [class.bg-card]="modalPriority() === 'High'"
              [class.border-accent]="modalPriority() === 'High'"
              [class.text-accent]="modalPriority() === 'High'"
              [class.border-border]="modalPriority() !== 'High'"
              [class.text-foreground/60]="modalPriority() !== 'High'">
              Alta
            </button>
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="px-6 py-4 border-t border-border/80 flex items-center justify-end gap-3 bg-card/20">
        <button 
          type="button" 
          (click)="onCloseClick()" 
          class="px-4 py-2 text-xs font-mono border border-border/80 hover:bg-card/60 rounded-lg cursor-pointer transition-colors focus:outline-none">
          Cancelar
        </button>
        <button 
          type="button" 
          (click)="onSaveClick()" 
          class="px-4 py-2 text-xs font-mono bg-primary text-white hover:bg-primary/90 rounded-lg cursor-pointer transition-colors focus:outline-none shadow-sm">
          {{ task ? 'Actualizar' : 'Crear Tarea' }}
        </button>
      </div>

    </div>
  </div>
}
