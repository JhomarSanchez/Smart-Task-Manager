<div 
  class="task-card bg-card border border-border rounded-xl p-4 shadow-[0_1px_3px_rgba(0,0,0,0.02)] hover:border-primary/45 dark:hover:border-primary/45 hover:shadow-lg transition-all duration-200 relative overflow-visible group flex flex-col gap-2.5">
  
  <div class="flex justify-between items-start gap-4">
    <!-- Title -->
    <span 
      class="font-semibold text-xs leading-snug tracking-tight text-foreground/90 transition-colors group-hover:text-primary cursor-pointer select-none"
      [class.line-through]="task.status === 'Done'"
      [class.text-foreground/50]="task.status === 'Done'"
      (click)="onEditClick($event)">
      {{ task.title }}
    </span>
    
    <!-- Card Menu trigger -->
    <div class="relative shrink-0 select-none">
      <button 
        (click)="toggleMenu($event)" 
        class="text-foreground/35 hover:text-foreground cursor-pointer focus:outline-none p-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM12.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0ZM18.75 12a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>
      </button>

      <!-- Card Action Overlay menu -->
      @if (showMenu()) {
        <div class="absolute right-0 top-6 bg-card border border-border rounded-lg shadow-xl w-24 py-1 z-30 animate-[fadeIn_0.1s_ease-out]">
          <button (click)="onEditClick($event)" class="w-full text-left px-3 py-1 hover:bg-background text-xs font-mono text-foreground cursor-pointer">Editar</button>
          <button (click)="onDeleteClick($event)" class="w-full text-left px-3 py-1 hover:bg-background text-xs font-mono text-rose-500 cursor-pointer">Eliminar</button>
        </div>
      }
    </div>
  </div>

  <!-- Description -->
  @if (task.description) {
    <p class="text-[11px] text-foreground/50 font-normal leading-relaxed line-clamp-3 select-text">
      {{ task.description }}
    </p>
  }

  <!-- Badges footer -->
  <div class="flex items-center justify-between gap-2 pt-1.5">
    <div class="flex flex-wrap items-center gap-1.5">
      <!-- Display category cleanly -->
      <span class="bg-primary text-white text-[9px] font-semibold px-2.5 py-0.5 rounded-full select-none tracking-tight">
        {{ (task.category?.split(':')?.[0] || task.category) || 'General' }}
      </span>
      <!-- High Priority (Rose accent border and badge) -->
      @if (task.priority === 'High') {
        <span class="bg-accent text-white text-[9px] font-semibold px-2.5 py-0.5 rounded-full select-none tracking-tight">
          High Priority
        </span>
      }
      <span class="bg-neutral-150 dark:bg-neutral-800 text-foreground/50 text-[9px] px-2 py-0.5 rounded-full select-none font-mono tracking-tight">
        Sprint 8
      </span>
    </div>
  </div>

  <!-- Footer with date and avatars -->
  <div class="flex items-center justify-between border-t border-border/50 pt-2.5 mt-0.5">
    <!-- Overlapping Avatars -->
    <div class="flex items-center -space-x-1.5 select-none">
      <div class="w-4.5 h-4.5 rounded-full bg-primary text-white text-[7px] flex items-center justify-center font-bold border border-card shadow-sm">
        JM
      </div>
      <div class="w-4.5 h-4.5 rounded-full bg-accent text-white text-[7px] flex items-center justify-center font-bold border border-card shadow-sm">
        JM
      </div>
    </div>

    <!-- Date -->
    @if (task.dueDate) {
      <span class="flex items-center gap-1 font-light text-[10px] text-foreground/40">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-3.5 h-3.5 text-foreground/35">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        {{ task.dueDate | date:'d MMM' }}
      </span>
    }
  </div>

</div>
