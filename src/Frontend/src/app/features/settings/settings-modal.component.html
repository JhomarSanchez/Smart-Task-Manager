@if (isOpen) {
  <div class="fixed inset-0 bg-black/75 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-background border border-border w-full max-w-lg rounded-xl shadow-2xl overflow-hidden animate-[fadeIn_0.2s_ease-out]">
      
      <!-- Modal Header -->
      <div class="px-6 py-4 border-b border-border/80 flex items-center justify-between bg-card/25">
        <h3 class="font-bold text-xs tracking-wide font-mono uppercase text-foreground/80">
          Ajustes de IA (Opcional)
        </h3>
        <button (click)="onCloseClick()" class="text-foreground/45 hover:text-foreground p-1 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="p-6 flex flex-col gap-5">
        <!-- Enable AI Connection Toggle -->
        <div class="flex items-center justify-between pb-2 border-b border-border/60">
          <div class="flex flex-col">
            <span class="text-xs font-bold text-foreground/90">Habilitar Procesamiento de IA</span>
            <span class="text-[10px] text-foreground/40 font-mono">Permite parsear texto libre con IA</span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer select-none">
            <input 
              type="checkbox" 
              [ngModel]="aiEnabled()" 
              (ngModelChange)="aiEnabled.set($event)"
              class="sr-only peer"
            />
            <div class="w-9 h-5 bg-border/80 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-border after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
          </label>
        </div>

        @if (aiEnabled()) {
          <!-- AI Provider Select -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Proveedor de Inteligencia Artificial</label>
            <select 
              [ngModel]="aiProvider()" 
              (ngModelChange)="aiProvider.set($event)"
              class="w-full px-3 py-2 border rounded-lg bg-card text-foreground focus:outline-none focus:ring-1 focus:ring-primary text-sm font-sans"
            >
              <option value="Gemini">Google Gemini AI</option>
              <option value="OpenAI">OpenAI (GPT)</option>
            </select>
          </div>

          <!-- API Key Input -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Clave de API (API Key)</label>
            <input 
              type="password" 
              [ngModel]="aiApiKey()" 
              (ngModelChange)="aiApiKey.set($event)"
              placeholder="Escribe tu API Key..."
              class="w-full px-3 py-2 border rounded-lg bg-card text-foreground placeholder-foreground/30 focus:outline-none focus:ring-1 focus:ring-primary text-sm font-mono"
            />
          </div>

          <!-- Model Name Input -->
          <div class="flex flex-col gap-1.5">
            <label class="text-[10px] font-mono uppercase tracking-wider text-foreground/50 font-bold">Nombre del Modelo</label>
            <input 
              type="text" 
              [ngModel]="aiModelName()" 
              (ngModelChange)="aiModelName.set($event)"
              placeholder="ej: gemini-1.5-flash o gpt-4o-mini"
              class="w-full px-3 py-2 border rounded-lg bg-card text-foreground placeholder-foreground/35 focus:outline-none focus:ring-1 focus:ring-primary text-sm font-mono"
            />
          </div>
        }
      </div>

      <!-- Modal Footer Actions -->
      <div class="px-6 py-4 border-t border-border/80 flex items-center justify-end gap-3 bg-card/25">
        <button 
          type="button" 
          (click)="onCloseClick()" 
          class="px-4 py-2 text-xs font-mono border border-border/80 hover:bg-card/50 rounded-lg cursor-pointer transition-colors focus:outline-none">
          Cancelar
        </button>
        <button 
          type="button" 
          (click)="onSaveClick()" 
          class="px-4 py-2 text-xs font-mono bg-primary text-white hover:bg-primary/95 rounded-lg cursor-pointer transition-colors focus:outline-none shadow-sm">
          Guardar Cambios
        </button>
      </div>

    </div>
  </div>
}
